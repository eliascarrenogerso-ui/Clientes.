<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes con Firebase</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --dark: #374151;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1, h2 {
            text-align: center;
            color: #111827;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: 1fr 2fr; }
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
        }
        
        button:active {
            transform: scale(0.98);
        }

        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: var(--danger-hover); }
        .btn-secondary { background: #9ca3af; color: white; }
        .btn-dark { background: var(--dark); color: white; display: block; margin: 20px auto; padding: 12px 24px; font-size: 1rem; }
        .btn-dark:hover { background: #1f2937; }

        .search-box {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
        }

        th { background-color: #f9fafb; }

        .actions {
            display: flex;
            gap: 5px;
        }

        .history-section {
            margin-top: 20px;
            background: #f9fafb;
            border-left: 4px solid #9ca3af;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sistema de Gestión de Clientes</h1>

    <div class="grid">
        <div class="card">
            <h2 id="form-title">Añadir Cliente</h2>
            <form id="client-form">
                <input type="hidden" id="client-id">
                <div class="form-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" required>
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required>
                </div>
                <button type="submit" class="btn-primary" id="btn-submit">Guardar Cliente</button>
                <button type="button" class="btn-secondary" id="btn-cancel" style="display:none; width:100%; margin-top:5px;">Cancelar Edición</button>
            </form>
        </div>

        <div class="card">
            <h2>Base de Datos General</h2>
            <div class="search-box">
                <input type="text" id="search" placeholder="🔍 Buscar por nombre, teléfono o email...">
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Teléfono</th>
                            <th>Email</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="client-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <button class="btn-dark" id="btn-toggle-history">📜 Mostrar Historial de Borrados</button>

    <div class="card history-section" id="history-card">
        <h2>Historial de Registros Eliminados (Solo lectura)</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Teléfono</th>
                        <th>Email</th>
                        <th>Fecha de Eliminación</th>
                    </tr>
                </thead>
                <tbody id="history-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Configuración
    const firebaseConfig = {
        apiKey: "AQUI_VA_TU_API_KEY", 
        authDomain: "control-de-imc.firebaseapp.com",
        projectId: "control-de-imc",
        storageBucket: "control-de-imc.firebasestorage.app",
        messagingSenderId: "686782395961",
        appId: "1:686782395961:web:2f9fdf0c205004cf5abfe8",
        measurementId: "G-PJ5J7MWKS1"
    };

    // Inicialización
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Referencias a colecciones de Firestore
    const clientesRef = collection(db, "clientes");
    const historialRef = collection(db, "historial");

    // Elementos del DOM
    const form = document.getElementById("client-form");
    const idInput = document.getElementById("client-id");
    const nombreInput = document.getElementById("nombre");
    const telefonoInput = document.getElementById("telefono");
    const emailInput = document.getElementById("email");
    const submitBtn = document.getElementById("btn-submit");
    const cancelBtn = document.getElementById("btn-cancel");
    const searchInput = document.getElementById("search");
    const clientTableBody = document.getElementById("client-table-body");
    const historyTableBody = document.getElementById("history-table-body");
    const formTitle = document.getElementById("form-title");
    const toggleHistoryBtn = document.getElementById("btn-toggle-history");
    const historyCard = document.getElementById("history-card");

    let listaClientes = [];

    // --- ACCIÓN MOSTRAR/OCULTAR HISTORIAL ---
    toggleHistoryBtn.addEventListener("click", () => {
        const isHidden = historyCard.style.display !== "block";
        historyCard.style.display = isHidden ? "block" : "none";
        toggleHistoryBtn.textContent = isHidden ? "🙈 Ocultar Historial de Borrados" : "📜 Mostrar Historial de Borrados";
        if (isHidden) {
            historyCard.scrollIntoView({ behavior: 'smooth' });
        }
    });

    // --- GUARDAR / MODIFICAR ---
    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const clienteData = {
            nombre: nombreInput.value.trim(),
            telefono: telefonoInput.value.trim(),
            email: emailInput.value.trim()
        };

        const id = idInput.value;

        try {
            if (id) {
                const docRef = doc(db, "clientes", id);
                await updateDoc(docRef, clienteData);
            } else {
                await addDoc(clientesRef, clienteData);
            }
            form.reset();
            resetFormState();
        } catch (error) {
            console.error("Error al procesar la operación:", error);
        }
    });

    cancelBtn.addEventListener("click", () => {
        form.reset();
        resetFormState();
    });

    function resetFormState() {
        idInput.value = "";
        formTitle.textContent = "Añadir Cliente";
        submitBtn.textContent = "Guardar Cliente";
        cancelBtn.style.display = "none";
    }

    // --- ESCUCHA EN TIEMPO REAL: TABLA GENERAL ---
    onSnapshot(clientesRef, (snapshot) => {
        listaClientes = [];
        snapshot.forEach((doc) => {
            listaClientes.push({ id: doc.id, ...doc.data() });
        });
        renderClientes();
    });

    // --- RENDERIZADO Y BUSCADOR SEGURO ---
    function renderClientes() {
        const queryText = searchInput.value.toLowerCase();
        clientTableBody.innerHTML = "";
        const fragment = document.createDocumentFragment();

        listaClientes.forEach((c) => {
            if (c.nombre.toLowerCase().includes(queryText) || 
                c.telefono.toLowerCase().includes(queryText) || 
                c.email.toLowerCase().includes(queryText)) {
                
                const tr = document.createElement("tr");

                // Inyección segura de strings para evitar XSS
                const tdNombre = document.createElement("td");
                tdNombre.textContent = c.nombre;
                const tdTelefono = document.createElement("td");
                tdTelefono.textContent = c.telefono;
                const tdEmail = document.createElement("td");
                tdEmail.textContent = c.email;

                const tdActions = document.createElement("td");
                tdActions.className = "actions";
                tdActions.innerHTML = `
                    <button class="btn-secondary btn-edit" data-id="${c.id}">Editar</button>
                    <button class="btn-danger btn-delete" data-id="${c.id}">Eliminar</button>
                `;

                tr.appendChild(tdNombre);
                tr.appendChild(tdTelefono);
                tr.appendChild(tdEmail);
                tr.appendChild(tdActions);
                
                fragment.appendChild(tr);
            }
        });
        clientTableBody.appendChild(fragment);
    }

    searchInput.addEventListener("input", renderClientes);

    // --- MANEJO DE EVENTOS EN LA TABLA ---
    clientTableBody.addEventListener("click", async (e) => {
        const id = e.target.getAttribute("data-id");
        if (!id) return;

        if (e.target.classList.contains("btn-edit")) {
            const cliente = listaClientes.find(c => c.id === id);
            if (cliente) {
                idInput.value = cliente.id;
                nombreInput.value = cliente.nombre;
                telefonoInput.value = cliente.telefono;
                emailInput.value = cliente.email;

                formTitle.textContent = "Modificar Cliente";
                submitBtn.textContent = "Actualizar Cambios";
                cancelBtn.style.display = "block";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        } 
        else if (e.target.classList.contains("btn-delete")) {
            if (!confirm("¿Estás seguro de que deseas eliminar este cliente?")) return;

            const clienteAEliminar = listaClientes.find(c => c.id === id);
            if (clienteAEliminar) {
                try {
                    // Copiar al historial usando ServerTimestamp
                    await addDoc(historialRef, {
                        nombre: clienteAEliminar.nombre,
                        telefono: clienteAEliminar.telefono,
                        email: clienteAEliminar.email,
                        fechaEliminado: serverTimestamp()
                    });

                    const docRef = doc(db, "clientes", id);
                    await deleteDoc(docRef);
                } catch (error) {
                    console.error("Error durante el proceso de baja:", error);
                }
            }
        }
    });

    // --- ESCUCHA EN TIEMPO REAL: HISTORIAL ORDENADO DESDE FIRESTORE ---
    const qHistorial = query(historialRef, orderBy("fechaEliminado", "desc"));
    
    onSnapshot(qHistorial, (snapshot) => {
        historyTableBody.innerHTML = "";
        const fragment = document.createDocumentFragment();
        
        snapshot.forEach((doc) => {
            const h = doc.data();
            const tr = document.createElement("tr");

            const tdNombre = document.createElement("td");
            tdNombre.textContent = h.nombre;
            const tdTelefono = document.createElement("td");
            tdTelefono.textContent = h.telefono;
            const tdEmail = document.createElement("td");
            tdEmail.textContent = h.email;

            const tdFecha = document.createElement("td");
            // Formatear la fecha del servidor si ya está disponible
            const dateObj = h.fechaEliminado ? h.fechaEliminado.toDate() : new Date();
            tdFecha.innerHTML = `<small>${dateObj.toLocaleString()}</small>`;

            tr.appendChild(tdNombre);
            tr.appendChild(tdTelefono);
            tr.appendChild(tdEmail);
            tr.appendChild(tdFecha);

            fragment.appendChild(tr);
        });
        historyTableBody.appendChild(fragment);
    });
</script>
</body>
</html>
